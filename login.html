<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Connexion - mon50ccetmoi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" integrity="sha256-HtsXJanqjKTc8vVQjO4YMhiqFoXkfBsjBWcXtkzj2xw=" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <!-- CryptoJS -->
    <script src="crypto-js.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-body">
    <div class="login-overlay">
        <div class="login-container glassmorphism">
            <div class="login-logo"><i class="fa-solid fa-motorcycle"></i></div>
            <h1 class="login-title">mon50ccetmoi</h1>
            <p class="login-subtitle">La 1ère communauté 50cc</p>
            
            <div id="login-form" class="auth-form">
                <input type="text" id="login-user" placeholder="Votre Pseudo" />
                <input type="password" id="login-pass" placeholder="Mot de passe" />
                <button onclick="doLogin()" class="btn-auth">SE CONNECTER</button>
                <div style="margin: 15px 0; color: #888; font-size: 0.9rem;">OU</div>
                <button onclick="loginAsGuest()" class="btn-auth" style="background:transparent; border:1px solid #999; color:#fff; margin-bottom: 20px;">
                    👤 Mode Invité Libre
                </button>

                <!-- Google Sign-In Button -->
                <div id="g_id_onload"
                     data-client_id="618915667828-ebv4uc1ehq7mhks9l1qajrtg7k833jab.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     style="margin-bottom: 20px;">
                </div>
                <p class="switch-link" onclick="toggleForm('register')">Pas encore membre ? <strong>Rejoindre</strong></p>
            </div>

            <div id="register-form" class="auth-form hidden">
                <input type="text" id="reg-user" placeholder="Choisissez un pseudo unique" />
                <input type="password" id="reg-pass" placeholder="Mot de passe" />
                <select id="reg-brand" class="scooter-brand-select">
                    <option value="" disabled selected>Marque de votre 50cc</option>
                    <option value="Jordon / Jog (MAXISCOOT)">Jordon / Jog (Groupe MAXISCOOT)</option>
                    <option value="Peugeot">Peugeot</option>
                    <option value="MBK / Yamaha">MBK / Yamaha</option>
                    <option value="Piaggio / Gilera">Piaggio / Gilera</option>
                    <option value="Neco">Neco</option>
                    <option value="TNT Motor">TNT Motor</option>
                    <option value="Mash">Mash</option>
                    <option value="Lexmoto">Lexmoto</option>
                    <option value="Magpower">Magpower</option>
                    <option value="Orcal">Orcal</option>
                    <option value="Yadea">Yadea</option>
                    <option value="Kymco">Kymco</option>
                    <option value="Sym">Sym</option>
                    <option value="Autre">Autre</option>
                </select>
                <button onclick="doRegister()" class="btn-auth btn-auth-alt">CRÉER MON COMPTE</button>
                <p class="switch-link" onclick="toggleForm('login')">Déjà inscrit ? <strong>Se connecter</strong></p>
            </div>
            

        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function toggleForm(formType) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById(formType + '-form').classList.remove('hidden');
        }

        function doLogin() {
            login(document.getElementById('login-user').value, document.getElementById('login-pass').value);
        }
        function doRegister() {
            register(document.getElementById('reg-user').value, document.getElementById('reg-pass').value, document.getElementById('reg-brand').value);
        }

        // --- NEW: Google Login Callback ---
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            // Parse JWT (Legacy simple way for demo, in real life use a backend or verify signature)
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const payload = JSON.parse(jsonPayload);
            console.log("Nom:", payload.name, "Email:", payload.email);
            
            // Bridge with auth.js
            googleLogin(payload.name, payload.email);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker (Login) enregistré'))
                    .catch(err => console.log('Échec Service Worker: ', err));
            });
        }
    </script>
</body>
</html>
